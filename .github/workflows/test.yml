name: API Test
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build
        run: mvn package -q -DskipTests && mvn dependency:copy-dependencies -q
      - name: Run API test
        env:
          VOICEIT_API_KEY: ${{ secrets.VOICEIT_API_KEY }}
          VOICEIT_API_TOKEN: ${{ secrets.VOICEIT_API_TOKEN }}
        run: |
          cd test
          javac -cp "../target/*:../target/dependency/*" TestExample.java
          java -cp ".:../target/*:../target/dependency/*" TestExample
